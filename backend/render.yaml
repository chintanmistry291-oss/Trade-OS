services:
  - type: web
    name: trade-os-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: trade_os
      - key: CORS_ORIGINS
        sync: false
    autoDeploy: true
